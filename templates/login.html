<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Fake Personality Detector</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

/* Background image */

body{
height:100vh;
background-image:url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* dark overlay so text is visible */

.overlay{
background:rgba(0,0,0,0.65);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* login card */

.container{
background:rgba(255,255,255,0.08);
padding:45px;
border-radius:16px;
width:360px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 12px 30px rgba(0,0,0,0.6);
color:white;
}

/* title */

h2{
font-size:28px;
margin-bottom:28px;
letter-spacing:1px;
}

/* input fields */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

/* login button */

button{
width:100%;
padding:12px;
margin-top:18px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

/* signup link */

p{
margin-top:20px;
font-size:14px;
}

a{
color:#00c6ff;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h2>User Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?  
<a href="/signup">Sign Up</a></p>

</div>

</div>

</body>
</html>
