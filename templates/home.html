<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake Personality Detector</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

/* Background */

body{
height:100vh;
background-image: url("https://images.unsplash.com/photo-1555949963-aa79dcee981c");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* Dark overlay */

.overlay{
background:rgba(0,0,0,0.65);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* Glass container */

.container{
text-align:center;
color:white;
max-width:650px;
padding:50px;
border-radius:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Title */

h1{
font-size:48px;
letter-spacing:2px;
margin-bottom:35px;
text-shadow:0 0 15px rgba(0,255,255,0.7);
}

/* Description */

p{
font-size:18px;
line-height:1.6;
color:#e6e6e6;
margin-bottom:55px;
}

/* Buttons container */

.buttons{
display:flex;
justify-content:center;
gap:25px;
}

/* Button style */

button{
padding:14px 36px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
font-weight:600;
}

/* Login button */

.login-btn{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

/* Signup button */

.signup-btn{
background:linear-gradient(45deg,#ff7b00,#ff3c00);
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.signup-btn:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

/* Footer */

footer{
position:absolute;
bottom:20px;
color:#d0d0d0;
font-size:14px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h1>Fake Personality Detector</h1>

<p>
An AI-based system that analyzes written statements and detects
whether the personality expressed appears genuine or exaggerated.
</p>

<div class="buttons">

<a href="/login">
<button class="login-btn">Login</button>
</a>

<a href="/signup">
<button class="signup-btn">Sign Up</button>
</a>

</div>

</div>

<footer>
AI Personality Analysis System
</footer>

</div>

</body>
</html>
